version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: proyecto-marisol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: proyecto_marisol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proyecto_marisol"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
